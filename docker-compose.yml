version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: teamsoccer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       teamsoccer
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - teamsoccer_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  teamsoccer_data:
